# NPM Publishing workflow for codex-cli.
# This workflow automatically publishes to @itamux/codex npm package
# after a successful rust-release workflow completion.

name: npm-publish
on:
  workflow_run:
    workflows: ["rust-release"]
    types:
      - completed
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  publish-npm:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@itamux'

      - name: Download npm artifact from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          # Get the tag from the workflow run
          TAG="${{ github.event.workflow_run.head_branch }}"
          if [[ "$TAG" != rust-v* ]]; then
            echo "Not a rust release tag: $TAG"
            exit 0
          fi
          
          # Extract version from tag (remove "rust-v" prefix)
          VERSION="${TAG#rust-v}"
          echo "Version to publish: $VERSION"
          
          # Download the npm package from the release
          echo "Downloading npm package for version $VERSION..."
          gh release download "$TAG" --pattern "codex-npm-$VERSION.tgz" --dir ./
          
          # Verify the artifact exists
          if [[ ! -f "codex-npm-$VERSION.tgz" ]]; then
            echo "Error: npm package artifact not found"
            exit 1
          fi
          
          echo "Successfully downloaded codex-npm-$VERSION.tgz"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          
          # Publish the npm package
          echo "Publishing to npm..."
          npm publish "codex-npm-${{ github.event.workflow_run.head_branch#rust-v }}.tgz" --access public
          
          echo "Successfully published to npm"

      - name: Create release comment
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#rust-v}"
          
          # Find the release and add a comment
          gh release view "$TAG" --json body -q '.body' > release_body.txt
          
          COMMENT="## 📦 NPM Package Published

The npm package \`@itamux/codex@$VERSION\` has been automatically published to npm.

- npm: https://www.npmjs.com/package/@itamux/codex/v/$VERSION
- Installation: \`npm install -g @itamux/codex@$VERSION\`

---
*This comment was automatically generated by the npm-publish workflow.*"
          
          echo "$COMMENT" >> release_body.txt
          gh release edit "$TAG" --notes-file release_body.txt
          rm release_body.txt

      - name: Notify on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#rust-v}"
          
          # Create issue for failed publish
          ISSUE_TITLE="❌ NPM Publish Failed: $VERSION"
          ISSUE_BODY="## NPM Publishing Failed

The automated npm publishing workflow failed for version \`$VERSION\`.

**Release Tag:** \`$TAG\`
**Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
**Workflow Log:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

### Next Steps

1. Check the workflow logs for the root cause
2. Manually publish if needed using:
   \`\`\`bash
   ./scripts/publish_to_npm.py "$VERSION"
   \`\`\`
3. Fix any issues and retry the workflow

---
*This issue was automatically generated by the npm-publish workflow.*"

          gh issue create --title "$ISSUE_TITLE" --body "$ISSUE_BODY" --label "bug,priority-high"