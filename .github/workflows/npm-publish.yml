# NPM Publishing workflow for codex-cli.
# This workflow automatically publishes to @itamux/codex npm package
# after a successful rust-release workflow completion.

name: npm-publish
on:
  # Manual trigger with version input
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.3.7)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (skip actual publishing)'
        required: false
        type: boolean
        default: false
  # Automatic trigger after rust-release
  workflow_run:
    workflows: ["rust-release"]
    types:
      - completed
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@itamux'

      - name: Determine version and trigger type
        id: determine-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger
            VERSION="${{ github.event.inputs.version }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
            TAG="rust-v$VERSION"
            echo "Manual trigger - Version: $VERSION, Dry run: $DRY_RUN"
          elif [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
            # Automatic trigger after rust-release
            TAG="${{ github.event.workflow_run.head_branch }}"
            if [[ "$TAG" != rust-v* ]]; then
              echo "Not a rust release tag: $TAG"
              exit 0
            fi
            VERSION="${TAG#rust-v}"
            DRY_RUN="false"
            echo "Automatic trigger - Version: $VERSION, Tag: $TAG"
          else
            echo "Unsupported trigger type"
            exit 1
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "dry_run=$DRY_RUN" >> $GITHUB_OUTPUT
          echo "trigger_type=${{ github.event_name }}" >> $GITHUB_OUTPUT

      - name: Download npm artifact from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          VERSION="${{ steps.determine-version.outputs.version }}"
          TAG="${{ steps.determine-version.outputs.tag }}"
          
          echo "Version to publish: $VERSION"
          echo "Release tag: $TAG"
          
          # Download the npm package from the release
          echo "Downloading npm package for version $VERSION..."
          gh release download "$TAG" --pattern "codex-npm-$VERSION.tgz" --dir ./
          
          # Verify the artifact exists
          if [[ ! -f "codex-npm-$VERSION.tgz" ]]; then
            echo "Error: npm package artifact not found"
            exit 1
          fi
          
          echo "Successfully downloaded codex-npm-$VERSION.tgz"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          
          VERSION="${{ steps.determine-version.outputs.version }}"
          DRY_RUN="${{ steps.determine-version.outputs.dry_run }}"
          
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "🧪 Dry run: Would publish to npm..."
            npm publish "codex-npm-$VERSION.tgz" --dry-run --access public
            echo "Dry run completed successfully"
          else
            echo "Publishing to npm..."
            npm publish "codex-npm-$VERSION.tgz" --access public
            echo "Successfully published to npm"
          fi

      - name: Create release comment
        if: success() && steps.determine-version.outputs.trigger_type == 'workflow_run'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          VERSION="${{ steps.determine-version.outputs.version }}"
          TAG="${{ steps.determine-version.outputs.tag }}"
          DRY_RUN="${{ steps.determine-version.outputs.dry_run }}"
          
          # Only add comment for automatic triggers and non-dry runs
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Dry run - skipping release comment"
            exit 0
          fi
          
          # Find the release and add a comment
          gh release view "$TAG" --json body -q '.body' > release_body.txt
          
          COMMENT="## 📦 NPM Package Published

The npm package \`@itamux/codex@$VERSION\` has been automatically published to npm.

- npm: https://www.npmjs.com/package/@itamux/codex/v/$VERSION
- Installation: \`npm install -g @itamux/codex@$VERSION\`

---
*This comment was automatically generated by the npm-publish workflow.*"
          
          echo "$COMMENT" >> release_body.txt
          gh release edit "$TAG" --notes-file release_body.txt
          rm release_body.txt

      - name: Notify on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          VERSION="${{ steps.determine-version.outputs.version }}"
          TAG="${{ steps.determine-version.outputs.tag }}"
          TRIGGER_TYPE="${{ steps.determine-version.outputs.trigger_type }}"
          
          # Create issue for failed publish
          ISSUE_TITLE="❌ NPM Publish Failed: $VERSION"
          ISSUE_BODY="## NPM Publishing Failed

The automated npm publishing workflow failed for version \`$VERSION\`.

**Release Tag:** \`$TAG\`
**Trigger Type:** \`$TRIGGER_TYPE\`
**Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
**Workflow Log:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

### Next Steps

1. Check the workflow logs for the root cause
2. Manually publish if needed using:
   \`\`\`bash
   ./scripts/publish_to_npm.py "$VERSION"
   \`\`\`
3. Fix any issues and retry the workflow

---
*This issue was automatically generated by the npm-publish workflow.*"

          gh issue create --title "$ISSUE_TITLE" --body "$ISSUE_BODY" --label "bug,priority-high"